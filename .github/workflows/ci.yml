name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  test:
    name: Lint & Unit Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            portaudio19-dev libportaudio2 libsndfile1 \
            libgl1 libglib2.0-0 libsm6 libxext6 libxrender-dev \
            ffmpeg

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          # Filter out Windows-only packages
          grep -vE "^\s*(pywin32|pywinauto|pyautogui)" requirements.txt > /tmp/ci_reqs.txt
          pip install -r /tmp/ci_reqs.txt

      - name: Smoke test — verify key imports
        run: |
          python -c "
          import sys
          failed = []
          modules = [
              'ollama', 'fastapi', 'aiosqlite', 'faiss',
              'sounddevice', 'speech_recognition', 'httpx',
              'spotipy', 'discord', 'telegram', 'cv2', 'numpy',
          ]
          for m in modules:
              try:
                  __import__(m)
              except ImportError as e:
                  failed.append(f'{m}: {e}')
          if failed:
              print('FAILED imports:')
              for f in failed:
                  print(f'  {f}')
              sys.exit(1)
          print(f'All {len(modules)} imports OK')
          "

      - name: Run unit tests (no live services required)
        run: |
          pytest tests/ -x -q \
            --ignore=tests/live_test.py \
            --ignore=tests/quick_live.py \
            --ignore=tests/check_ollama.py \
            --ignore=tests/do_login.py \
            -m "not live and not integration" \
            --timeout=30 \
            2>&1 | head -100
        continue-on-error: false

      - name: Run integration tests (mocked — no real services)
        run: |
          pytest tests/ -x -q \
            --ignore=tests/live_test.py \
            --ignore=tests/quick_live.py \
            --ignore=tests/check_ollama.py \
            --ignore=tests/do_login.py \
            -m "integration and not live" \
            --timeout=60 \
            2>&1 | head -100
        continue-on-error: true   # integration tests may need optional services
